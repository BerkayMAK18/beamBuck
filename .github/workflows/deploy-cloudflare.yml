# Automated deploy to Cloudflare Workers on every push to main.
#
# This is the CI/CD counterpart to `scripts/deploy.sh` (manual/local deploy).
# It builds with the same Nitro cloudflare-module preset (zero extra config,
# see vite.config.ts) and patches `preview_urls: false` into the generated
# wrangler.json for the same reason deploy.sh does -- Cloudflare otherwise
# auto-enables an extra public "Preview URL" hostname per deployment, and
# that file is regenerated fresh on every build so the flag can't be
# committed once.
#
# Unlike deploy.sh, this workflow does NOT clamp `compatibility_date` against
# Cloudflare's server clock -- that workaround exists for local/sandboxed dev
# machines whose system clock can drift ahead of real time. GitHub-hosted
# runners are NTP-synced, so `compatibility_date` (stamped by Nitro from the
# runner's clock) is always safe to send as-is.
#
# Required GitHub Actions secrets (Settings -> Secrets and variables -> Actions):
#   VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, VITE_SUPABASE_PROJECT_ID
#     -- public/anon values, baked into the client bundle at build time.
#   CLOUDFLARE_API_TOKEN
#     -- scoped token with "Cloudflare Workers Scripts: Edit" (or Workers
#        Deploy) permission for this account. Create at
#        https://dash.cloudflare.com/profile/api-tokens.
#   CLOUDFLARE_ACCOUNT_ID (optional)
#     -- only needed if the token above has access to more than one account.
#
# Server-only vars (SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY,
# SUPABASE_SERVICE_ROLE_KEY) are read from process.env at *runtime* by the
# deployed Worker, not baked in at build time -- they must already be set as
# Cloudflare Worker variables/secrets (dashboard -> Workers & Pages -> this
# worker -> Settings -> Variables, or `wrangler secret put <NAME>`) and are
# untouched by this workflow or by redeploys.
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "supabase/**"
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Disable Cloudflare preview URLs
        run: |
          python3 -c "
          import json
          path = '.output/server/wrangler.json'
          with open(path) as f:
              d = json.load(f)
          d['preview_urls'] = False
          with open(path, 'w') as f:
              json.dump(d, f, indent=2)
          "

      - name: Deploy
        run: npx wrangler deploy --cwd .output/
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
