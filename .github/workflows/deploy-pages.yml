# KNOWN BROKEN as of 2026-07-08 — do not rely on this yet.
#
# `bun run build` with NITRO_PRESET=github-pages currently fails on this
# project's pinned toolchain (nitro 3.0.260603-beta / 3.0.260610-beta, vite
# 8.1.3, @tanstack/react-start 1.168.27): the final "building nitro
# environment for production" step throws
#   "rolldownOptions.input should not be an html file when building for SSR."
# and the prerendered index.html/404.html it does manage to write are 0
# bytes even on the runs that don't crash. This reproduces with both the
# default `tanstackStart.server.entry` override AND without it, and with
# TanStack Start's own `spa: { enabled: true }` mode — so it's an upstream
# bug in how Nitro's static/prerender preset family interacts with
# TanStack Start's SSR entry in this beta combination, not an app config
# issue. The default Cloudflare Workers build (`bun run build` with no
# NITRO_PRESET override) works fine — see README.md "Build for production".
#
# Trigger is workflow_dispatch-only until this is confirmed fixed (retest
# after bumping nitro/vite/@tanstack/react-start), so it doesn't silently
# fail on every push to main.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid two deploys racing each other; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: bun install --frozen-lockfile

      - name: Build (static, prerendered for GitHub Pages)
        run: bun run build
        env:
          NITRO_PRESET: github-pages
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Public/anon values only — see SUPABASE.md. Set these as repo secrets
          # under Settings -> Secrets and variables -> Actions.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
