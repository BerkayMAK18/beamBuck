project_id = "zysbriojsrnlxdgtkkbx"

# NOTE: `supabase config push` diffs this file's FULL schema against
# built-in CLI defaults, not just the sections you write — any field left
# unset here gets pushed as whatever the CLI's scaffold default is, which
# can silently overwrite live settings you never intended to touch. Every
# field below except [auth.hook.before_user_created] is pinned to match
# this project's actual pre-existing values (captured from a `config push`
# diff on 2026-07-08) purely to prevent that — it is NOT a statement that
# these are the "right" values, just the values already live. Change them
# deliberately, not by leaving them unset.

# Enforces the invite allowlist at signup (see SUPABASE.md and the
# hook_enforce_signup_allowlist migration). Without this, anyone who calls
# the Supabase Auth signup API directly bypasses the frontend's allowlist
# pre-check entirely.
[auth.hook.before_user_created]
enabled = true
uri = "pg-functions://postgres/public/hook_enforce_signup_allowlist"

# site_url / additional_redirect_urls: the app calls signUp/signIn/
# resetPasswordForEmail with emailRedirectTo built from window.location.origin
# (plus /reset-password for the password-reset flow), and Supabase only
# honors redirects matching site_url or this list. Wildcarded with /** so
# every current and future path under each origin is covered without
# needing a new entry per route. site_url is the deployed Cloudflare
# Worker (production); localhost:5173 stays in the list for local dev.
# Update site_url again if you attach a custom domain later.
#
# minimum_password_length / password_requirements: bumped from the
# fresh-project defaults (6 chars, no character-class requirement) since
# leaked-password checking (Pro-only) isn't enabled — this is the main
# remaining defense against a weak/reused password. Doesn't affect
# existing accounts, only future signups/password changes.
[auth]
site_url = "https://berkaymak18-beambuck.akdemir-berkay.workers.dev"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/**",
  "https://berkaymak18-beambuck.akdemir-berkay.workers.dev",
  "https://berkaymak18-beambuck.akdemir-berkay.workers.dev/**",
]
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits"

# No frontend UI exists for MFA enrollment, so leaving it enabled just
# means an unused, unreviewed feature is reachable via direct API calls.
# Disabled as cleanup, not because it was a live weakness.
[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[storage.vector]
enabled = false